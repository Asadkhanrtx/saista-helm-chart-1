apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saista-bakers
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/SaistaBakers/saista-helm-charts
    targetRevision: main                   
    path: helm                             

    helm:
      releaseName: saista-bakers
      valueFiles:
        - values.yaml                      # base values (always applied)
        - values-dev.yaml                  # uncomment for dev overrides
        # - values-prod.yaml               # uncomment for prod overrides

  destination:
    server: https://kubernetes.default.svc # in-cluster; change for remote clusters
    namespace: dev

  syncPolicy:
    automated:
      prune: true      # delete resources removed from the chart
      selfHeal: true   # revert out-of-band changes in the cluster
    syncOptions:
      - CreateNamespace=true   # creates the `dev` namespace if it doesn't exist
