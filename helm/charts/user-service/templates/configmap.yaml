apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: {{ .Values.global.namespace }}
data:
  DB_HOST: "mysql.{{ .Values.global.namespace }}.svc.cluster.local"
  DB_USER: {{ .Values.global.db.user | quote }}
  DB_NAME: {{ .Values.global.db.name | quote }}
  DB_PORT: {{ .Values.global.db.port | quote }}
