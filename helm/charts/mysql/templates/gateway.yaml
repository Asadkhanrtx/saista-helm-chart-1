apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: saista-gateway-class
spec:
  controllerName: {{ .Values.gateway.controllerName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  gatewayClassName: saista-gateway-class
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
