apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: {{ .Values.global.namespace }}
data:
  DB_HOST: "mysql.{{ .Values.global.namespace }}.svc.cluster.local"
  DB_USER: {{ .Values.global.db.user | quote }}
  DB_NAME: {{ .Values.global.db.name | quote }}
  DB_PORT: {{ .Values.global.db.port | quote }}
  ORDER_SERVICE_URL: "http://order-service.{{ .Values.global.namespace }}.svc.cluster.local:5002"
  USER_SERVICE_URL: "http://user-service.{{ .Values.global.namespace }}.svc.cluster.local:5001"
  SMTP_SERVER: {{ .Values.smtp.server | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SENDER_EMAIL: {{ .Values.smtp.senderEmail | quote }}
  SMTP_USER: {{ .Values.smtp.user | quote }}
