apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order-service-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: saista-gateway
      namespace: {{ .Values.global.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: order-service
          port: {{ .Values.port }}
