server {
    listen 80;
    server_name _;

    # User Service — strips /api/users prefix, proxies to :5001
    location ~ ^/api/users {
        rewrite ^/api/users/?(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Order Service — strips /api/orders prefix, proxies to :5002
    location ~ ^/api/orders {
        rewrite ^/api/orders/?(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Payment Service — strips /api/payment prefix, proxies to :5003
    location ~ ^/api/payment {
        rewrite ^/api/payment/?(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Default — return 404 for anything not matching /api/*
    location / {
        return 404 '{"detail":"Not Found"}';
        add_header Content-Type application/json;
    }
}