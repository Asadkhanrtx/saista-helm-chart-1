server {
    listen 80;
    server_name localhost;

    # Serve the React SPA — all routing handled client-side
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API calls (/api/*) are routed by the ALB to the backend EC2 before
    # they ever reach this server — no proxying needed here.
}
