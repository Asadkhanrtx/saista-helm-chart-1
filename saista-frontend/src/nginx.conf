server {
    listen 80;
    server_name localhost;

    # Serve the React SPA — all routing handled client-side
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API calls (/api/*) do NOT need to be proxied here.
    # The Kubernetes Gateway API routes them directly to backend services
    # before the request ever reaches this container.
}
